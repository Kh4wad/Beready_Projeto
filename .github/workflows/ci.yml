name: CI

on:
  push:
    branches:
      - master
      - develop
      - 'feature/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  testsuite:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.4']

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, intl, pdo_sqlite
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          working-directory: backend

      - name: Run PHPUnit
        run: vendor/bin/phpunit
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_ENV: test

  coding-standard:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          working-directory: backend

      - name: Register PHPCS standards
        run: vendor/bin/phpcs --config-set installed_paths vendor/cakephp/cakephp-codesniffer,vendor/slevomat/coding-standard

      - name: Run PHPCS
        run: vendor/bin/phpcs --colors

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse src

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
          VITE_APP_ENV: ${{ secrets.VITE_APP_ENV }}