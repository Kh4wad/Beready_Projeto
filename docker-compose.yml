version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: beready_db
    environment:
      POSTGRES_DB: beready
      POSTGRES_USER: beready_user
      POSTGRES_PASSWORD: beready_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beready_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: beready_backend
    ports:
      - "8765:8765"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://beready_user:beready_pass@postgres:5432/beready
    volumes:
      - ./backend:/var/www/backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: beready_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/var/www/frontend
      - /var/www/frontend/node_modules

volumes:
  postgres_data:
